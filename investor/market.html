<!DOCTYPE html>
<html lang="id" class="bg-indigo-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bursa Modal UMKM - Koneksi Desa</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }
    </script>
    <style> [x-cloak] { display: none !important; } </style>
</head>
<body class="text-slate-800 font-sans antialiased overflow-hidden h-screen flex" x-data="marketApp()" x-init="initApp()">

    <!-- Sidebar -->
    <div class="fixed inset-0 bg-slate-900/50 z-40 lg:hidden" x-show="sidebarOpen" x-transition.opacity @click="sidebarOpen = false" x-cloak></div>
    
    <aside class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 flex flex-col transition-transform duration-300 shadow-2xl lg:shadow-none" :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'">
        <div class="h-16 flex items-center px-6 bg-slate-950 border-b border-indigo-900/50 font-heading font-bold text-xl text-white tracking-tight">Koneksi<span class="text-indigo-500">Desa</span></div>
        
        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
            <p class="px-3 text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 mt-2">Dasbor Utama</p>
            <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white font-medium transition"><i data-lucide="pie-chart" class="w-5 h-5"></i> Portofolio Kinerja</a>
            <a href="market.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-indigo-600/20 text-indigo-400 font-bold transition border border-indigo-500/20"><i data-lucide="store" class="w-5 h-5"></i> Bursa Modal UMKM</a>
            
            <p class="px-3 text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 mt-8">Arus Kas</p>
            <a href="wallet.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white font-medium transition"><i data-lucide="wallet" class="w-5 h-5"></i> Saldo & Dividen</a>
        </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white border-b border-indigo-100 flex items-center justify-between px-6 z-10 shrink-0">
            <div class="flex items-center gap-4">
                <button @click="sidebarOpen = true" class="lg:hidden text-slate-500"><i data-lucide="menu" class="w-5 h-5"></i></button>
                <h1 class="text-xl font-heading font-bold text-slate-900">Pasar Pendanaan Aktif</h1>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-indigo-700 bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100 hidden sm:block">Total Proposal: 14 Proyek</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto bg-indigo-50/30 p-4 md:p-8">
            <div class="max-w-7xl mx-auto space-y-8">
                
                <!-- Filter bar -->
                <div class="flex flex-wrap gap-2">
                    <button class="px-5 py-2 bg-slate-900 text-white font-bold rounded-xl text-sm shadow-md">Semua Proyek</button>
                    <button class="px-5 py-2 bg-white text-slate-600 font-bold rounded-xl text-sm border border-slate-200 hover:bg-slate-50 transition">Agrikultur (8)</button>
                    <button class="px-5 py-2 bg-white text-slate-600 font-bold rounded-xl text-sm border border-slate-200 hover:bg-slate-50 transition">Kriya & Kerajinan (4)</button>
                    <button class="px-5 py-2 bg-white text-slate-600 font-bold rounded-xl text-sm border border-slate-200 hover:bg-slate-50 transition">Kuliner (2)</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <template x-for="p in projects" :key="p.id">
                        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col hover:shadow-lg hover:border-indigo-200 transition duration-300 group relative">
                            
                            <!-- Badges -->
                            <div class="absolute top-4 left-4 z-10"><span class="bg-slate-900/80 backdrop-blur text-white text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-md" x-text="'Skor Kredit: '+p.score"></span></div>
                            <div class="absolute top-4 right-4 z-10"><span class="bg-emerald-500/90 backdrop-blur text-white text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-md shadow-sm">Bagi Hasil <span x-text="p.roi"></span>%</span></div>

                            <!-- Image -->
                            <div class="aspect-[16/9] relative bg-slate-100 overflow-hidden">
                                <img :src="p.img" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                <div class="absolute bottom-4 left-4 right-4"><h3 class="text-white font-bold text-lg leading-tight drop-shadow-md" x-text="p.title"></h3></div>
                            </div>
                            
                            <!-- Content -->
                            <div class="p-5 flex-1 flex flex-col">
                                <p class="text-slate-500 text-xs mb-4 flex items-center gap-1"><i data-lucide="store" class="w-3 h-3"></i> Oleh <b class="text-slate-700" x-text="p.umkm"></b></p>
                                
                                <div class="space-y-3 mb-6 flex-1">
                                    <div>
                                        <div class="flex justify-between text-xs font-bold text-slate-900 mb-1"><span x-text="'Terkumpul: Rp '+p.funded"></span><span x-text="p.progress+'%'"></span></div>
                                        <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden border border-slate-200"><div class="bg-indigo-500 h-2 rounded-full" :style="'width: '+p.progress+'%'"></div></div>
                                        <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold text-right" x-text="'Target Dana: Rp '+p.target"></p>
                                    </div>
                                    <div class="bg-slate-50 rounded-xl p-3 border border-slate-100 flex gap-4 text-xs font-bold">
                                        <div class="flex-1"><p class="text-slate-400 uppercase text-[9px] mb-0.5 tracking-wider">Durasi Kontrak</p><p class="text-slate-900" x-text="p.dur"></p></div>
                                        <div class="w-px bg-slate-200"></div>
                                        <div class="flex-1"><p class="text-slate-400 uppercase text-[9px] mb-0.5 tracking-wider">Metode Pembayaran</p><p class="text-slate-900">Bulanan</p></div>
                                    </div>
                                </div>
                                
                                <button @click="invest(p)" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition shadow-md shadow-slate-900/20 text-sm">Pelajari & Danai</button>
                            </div>
                        </div>
                    </template>
                </div>

            </div>
        </main>
    </div>

    <!-- Invest Modal -->
    <div x-show="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm" x-cloak>
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col" @click.away="modal = false">
            <div class="p-6 border-b border-slate-100 bg-indigo-600 text-white flex justify-between items-center">
                <h2 class="font-bold text-lg"><i data-lucide="shield-check" class="w-5 h-5 inline mr-1"></i> Konfirmasi Investasi</h2>
                <button @click="modal = false" class="text-indigo-200 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Proyek Dipilih</p>
                    <h3 class="font-bold text-slate-900 text-lg mb-2" x-text="selected.title"></h3>
                    <div class="flex gap-4 text-xs font-bold text-slate-600"><span class="bg-white px-2 py-1 rounded border border-slate-200"><i data-lucide="percent" class="w-3 h-3 inline"></i> ROI <span x-text="selected.roi"></span>%</span><span class="bg-white px-2 py-1 rounded border border-slate-200"><i data-lucide="clock" class="w-3 h-3 inline"></i> Tenor <span x-text="selected.dur"></span></span></div>
                </div>
                <div><label class="block text-xs font-bold text-slate-500 mb-2">Nilai Dana Dukungan (Minimal Rp 1 Juta)</label><input type="number" class="w-full px-4 py-3 bg-white border border-indigo-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/20 text-lg font-black text-slate-900" placeholder="0"></div>
                <p class="text-xs text-slate-500 text-center">*Dengan melanjutkan, saldo dompet KoneksiPay Anda akan dipotong.</p>
            </div>
            <div class="p-6 border-t border-slate-100 flex gap-3">
                <button @click="modal = false" class="w-1/3 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition">Batal</button>
                <button @click="confirm()" class="w-2/3 py-3 rounded-xl font-bold bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg transition">Suntikkan Dana</button>
            </div>
        </div>
    </div>

    <script>
        function marketApp() {
            return {
                sidebarOpen: false, modal: false, selected: {},
                projects: [
                    { id: 1, title: 'Pembelian Mesin Roasting Kopi Arabica', umkm: 'Tani Kopi Mekar', target: '25.000.000', funded: '10.500.000', progress: 42, score: 'A-', roi: 12, dur: '12 Bulan', img: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400&q=80' },
                    { id: 2, title: 'Ekspansi Gudang Penyimpanan Rotan', umkm: 'Kriya Rotan Abadi', target: '50.000.000', funded: '45.000.000', progress: 90, score: 'A+', roi: 15, dur: '24 Bulan', img: 'https://images.unsplash.com/photo-1627308595229-7830f5c92f4e?w=400&q=80' },
                    { id: 3, title: 'Modal Pembibitan Ternak Lele Bioflok', umkm: 'Pokdakan Tirta Makmur', target: '15.000.000', funded: '0', progress: 0, score: 'B+', roi: 18, dur: '6 Bulan', img: 'https://images.unsplash.com/photo-1502422780654-722a4d3dcfa0?w=400&q=80' }
                ],
                initApp() { setTimeout(() => lucide.createIcons(), 100); },
                invest(p) { this.selected = p; this.modal = true; },
                confirm() { alert('Dana berhasil disuntikkan! Portofolio akan bertambah.'); this.modal = false; }
            }
        }
    </script>
</body>
</html>
