<!DOCTYPE html>
<html lang="id" class="bg-indigo-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dompet Investor - Koneksi Desa</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] } } } }
    </script>
    <style> [x-cloak] { display: none !important; } </style>
</head>
<body class="text-slate-800 font-sans antialiased overflow-hidden h-screen flex" x-data="walletApp()" x-init="initApp()">

    <!-- Sidebar -->
    <div class="fixed inset-0 bg-slate-900/50 z-40 lg:hidden" x-show="sidebarOpen" x-transition.opacity @click="sidebarOpen = false" x-cloak></div>
    
    <aside class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 flex flex-col transition-transform duration-300 shadow-2xl lg:shadow-none" :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'">
        <div class="h-16 flex items-center px-6 bg-slate-950 border-b border-indigo-900/50 font-heading font-bold text-xl text-white tracking-tight">Koneksi<span class="text-indigo-500">Desa</span></div>
        
        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
            <p class="px-3 text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 mt-2">Dasbor Utama</p>
            <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white font-medium transition"><i data-lucide="pie-chart" class="w-5 h-5"></i> Portofolio Kinerja</a>
            <a href="market.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white font-medium transition"><i data-lucide="store" class="w-5 h-5"></i> Bursa Modal UMKM</a>
            
            <p class="px-3 text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 mt-8">Arus Kas</p>
            <a href="wallet.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-indigo-600/20 text-indigo-400 font-bold transition border border-indigo-500/20"><i data-lucide="wallet" class="w-5 h-5"></i> Saldo & Dividen</a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white border-b border-indigo-100 flex items-center justify-between px-6 z-10 shrink-0">
            <div class="flex items-center gap-4">
                <button @click="sidebarOpen = true" class="lg:hidden text-slate-500"><i data-lucide="menu" class="w-5 h-5"></i></button>
                <h1 class="text-xl font-heading font-bold text-slate-900">Dompet Digital</h1>
            </div>
            <img src="https://ui-avatars.com/api/?name=Kevin+W&background=4f46e5&color=fff" class="w-9 h-9 rounded-full border border-slate-200">
        </header>

        <main class="flex-1 overflow-y-auto bg-indigo-50/30 p-4 md:p-8">
            <div class="max-w-4xl mx-auto space-y-6">
                
                <div class="bg-indigo-900 text-white rounded-3xl p-8 relative overflow-hidden shadow-xl">
                    <div class="absolute -right-8 -top-8 w-48 h-48 bg-indigo-500 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
                    <div class="absolute -left-8 -bottom-8 w-48 h-48 bg-blue-500 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
                    
                    <div class="relative z-10 flex flex-col md:flex-row justify-between md:items-center gap-6">
                        <div>
                            <p class="text-indigo-200 font-bold text-sm tracking-wider uppercase mb-1">Saldo Tersedia (IDR)</p>
                            <h2 class="text-4xl md:text-5xl font-black font-mono">150.000.000</h2>
                            <p class="text-indigo-300 text-xs mt-2"><i data-lucide="shield-check" class="w-3 h-3 inline"></i> Dijamin oleh OJK KoneksiDesa</p>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-3">
                            <button @click="topup = true" class="px-6 py-3 bg-white text-indigo-900 font-bold rounded-xl shadow-lg hover:bg-slate-50 transition flex items-center gap-2 justify-center"><i data-lucide="arrow-down-to-line" class="w-4 h-4"></i> Top-up Kelolaan</button>
                            <button @click="wd = true" class="px-6 py-3 bg-indigo-800 border border-indigo-700 text-white font-bold rounded-xl hover:bg-indigo-700 transition flex items-center gap-2 justify-center"><i data-lucide="arrow-up-from-line" class="w-4 h-4"></i> Tarik Tunai</button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center"><h3 class="font-bold text-slate-900 text-lg">Mutasi Rekening</h3></div>
                    <div class="divide-y divide-slate-100">
                        <template x-for="m in mutasi" :key="m.id">
                            <div class="p-4 px-6 flex items-center justify-between hover:bg-slate-50 transition">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full flex items-center justify-center border font-bold" :class="m.tipe === 'Masuk' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-rose-50 text-rose-600 border-rose-100'"><i :data-lucide="m.tipe === 'Masuk' ? 'arrow-down-left' : 'arrow-up-right'" class="w-5 h-5"></i></div>
                                    <div><h4 class="font-bold text-slate-900" x-text="m.desc"></h4><p class="text-[10px] text-slate-500 uppercase tracking-wider font-bold" x-text="m.date"></p></div>
                                </div>
                                <span class="font-black text-lg" :class="m.tipe === 'Masuk' ? 'text-emerald-600' : 'text-slate-900'" x-text="(m.tipe === 'Masuk' ? '+ Rp ' : '- Rp ') + m.amt"></span>
                            </div>
                        </template>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Dialogs -->
    <div x-show="topup || wd" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" x-cloak>
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl text-center" @click.away="topup = false; wd = false">
            <div class="w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-4" :class="topup ? 'bg-indigo-100 text-indigo-600' : 'bg-emerald-100 text-emerald-600'"><i :data-lucide="topup ? 'wallet' : 'building-2'" class="w-8 h-8"></i></div>
            <h3 class="font-bold text-xl text-slate-900 mb-2" x-text="topup ? 'Top-up Integrasi Bank' : 'Transfer ke Bank Pencairan'"></h3>
            <p class="text-sm text-slate-500 mb-6" x-text="topup ? 'Masukkan instruksi nominal transfer virtual account.' : 'Proses pencairan dana akan dikirim ke rekening Mandiri Anda.'"></p>
            <input type="number" class="w-full text-center text-3xl font-black text-slate-900 h-16 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 mb-6" placeholder="0">
            <button @click="topup = false; wd = false; alert('Instruksi Diterima!')" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-slate-800 transition">Konfirmasi Tindakan</button>
        </div>
    </div>

    <script>
        function walletApp() {
            return {
                sidebarOpen: false, topup: false, wd: false,
                mutasi: [
                    { id: 1, tipe: 'Masuk', amt: '1.250.000', desc: 'Distribusi Dividen Sentra Tani (Bulan 2)', date: 'Hari ini, 09:12' },
                    { id: 2, tipe: 'Keluar', amt: '15.000.000', desc: 'Pembiayaan Koperasi Anyaman Rotan', date: 'Kemarin, 14:00' },
                    { id: 3, tipe: 'Masuk', amt: '50.000.000', desc: 'Top-Up Dana Kelolaan (VA Mandiri)', date: '10 Feb 2026' }
                ],
                initApp() { setTimeout(() => lucide.createIcons(), 100); }
            }
        }
    </script>
</body>
</html>
