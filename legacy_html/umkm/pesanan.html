<!DOCTYPE html>
<html lang="id" class="bg-slate-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Pesanan - Mitra UMKM</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="js/tailwind-config.js"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }
    </style>
</head>

<body class="text-slate-800 font-sans antialiased h-screen flex overflow-hidden" x-data="pesananApp()"
    x-init="initApp()">
    <!-- Sidebar -->
    <div class="fixed inset-0 bg-slate-900/50 z-40 lg:hidden" x-show="sidebarOpen" x-transition.opacity
        @click="sidebarOpen = false" x-cloak></div>
    <aside
        class="fixed lg:static inset-y-0 left-0 z-50 w-80 bg-slate-900 text-slate-300 flex flex-col transition-transform duration-300 shadow-2xl lg:shadow-none"
        :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'">
        <div
            class="h-16 flex items-center px-6 bg-emerald-950 border-b border-emerald-900 font-heading font-bold text-xl text-white tracking-tight">
            Koneksi<span class="text-emerald-500">Desa</span></div>
        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
            <p class="px-3 text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 mt-2">Insight & Performa</p>
            <a href="index.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white font-medium transition"><i
                    data-lucide="pie-chart" class="w-5 h-5"></i> Dashboard Insight Bisnis</a>
            <p class="px-3 text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 mt-8">Operasional Toko</p>
            <a href="produk.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white font-medium transition"><i
                    data-lucide="package" class="w-5 h-5"></i> Manajemen Katalog Produk</a>
            <a href="ai-harga.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white font-medium transition"><i
                    data-lucide="sparkles" class="w-5 h-5"></i> AI Rekomendasi Harga</a>
            <a href="pesanan.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-emerald-600/20 text-emerald-500 font-bold transition border border-emerald-500/20"><i
                    data-lucide="shopping-cart" class="w-5 h-5"></i> Manajemen Pesanan <span
                    class="bg-rose-500 text-white rounded-full px-2 text-xs font-bold ml-auto"
                    x-text="masukCount"></span></a>
            <p class="px-3 text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 mt-8">Modal & Kelayakan</p>
            <a href="pinjaman.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white font-medium transition"><i
                    data-lucide="hand-coins" class="w-5 h-5"></i> Pengajuan Pendanaan</a>
            <a href="skor.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white font-medium transition"><i
                    data-lucide="activity" class="w-5 h-5"></i> Monitoring Skor Kelayakan</a>
            <p class="px-3 text-xs font-bold uppercase tracking-wider text-slate-500 mb-2 mt-8">Komunikasi</p>
            <a href="chat.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white font-medium transition"><i
                    data-lucide="message-square" class="w-5 h-5"></i> Chat</a>
        </div>
    </aside>
    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header
            class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 z-10 shrink-0">
            <div class="flex items-center gap-4">
                <button @click="sidebarOpen = true" class="lg:hidden text-slate-500"><i data-lucide="menu"
                        class="w-5 h-5"></i></button>
                <h1 class="text-lg font-heading font-bold text-slate-900">Manajemen Pengiriman Paket</h1>
            </div>
        </header>
        <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50">
            <div class="max-w-5xl mx-auto space-y-6">
                <!-- Status Tab Filter -->
                <div class="flex flex-wrap gap-2 mb-6">
                    <button
                        class="px-4 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold shadow-md transition">Semua
                        Order</button>
                    <button
                        class="px-4 py-2 bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 rounded-xl text-sm font-bold transition">Perlu
                        Dikemas <span class="text-rose-500 ml-1">2</span></button>
                    <button
                        class="px-4 py-2 bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 rounded-xl text-sm font-bold transition">Dikirim
                        (Kurir)</button>
                    <button
                        class="px-4 py-2 bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 rounded-xl text-sm font-bold transition">Selesai</button>
                </div>
                <template x-for="dt in data" :key="dt.id">
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden mb-6">
                        <!-- Invoice Header -->
                        <div
                            class="px-6 py-4 border-b border-slate-100 flex flex-wrap justify-between items-center gap-4 bg-slate-50/50">
                            <div>
                                <div class="flex items-center gap-3 mb-1">
                                    <h4 class="font-bold text-slate-900 text-lg" x-text="'#'+dt.id"></h4>
                                    <span
                                        class="px-2.5 py-1 rounded text-[10px] font-bold uppercase tracking-wider text-white"
                                        :class="dt.status === 'Baru' ? 'bg-rose-500' : (dt.status === 'Dikemas' ? 'bg-amber-500' : 'bg-blue-500')"
                                        x-text="dt.status"></span>
                                </div>
                                <p class="text-xs text-slate-500 font-mono"><i data-lucide="clock"
                                        class="w-3 h-3 inline"></i> <span x-text="dt.time"></span> &bull; Pembeli: <b
                                        class="text-slate-700" x-text="dt.buyer"></b></p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Total
                                    Pendapatan</p>
                                <p class="font-black text-emerald-600 text-lg" x-text="'Rp '+dt.price"></p>
                            </div>
                        </div>
                        <!-- Items -->
                        <div class="px-6 py-4">
                            <div class="flex items-start gap-4">
                                <div
                                    class="w-16 h-16 rounded-xl bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-400 shrink-0">
                                    <i data-lucide="package" class="w-8 h-8"></i></div>
                                <div class="flex-1">
                                    <p class="font-bold text-slate-900 text-sm" x-text="dt.item"></p>
                                    <p class="text-xs text-slate-500 mt-1">Kurir: <b class="text-slate-700">GoSend
                                            Instant</b> (Jarak: 5.2 km)</p>
                                </div>
                            </div>
                        </div>
                        <!-- Action Bar -->
                        <div
                            class="px-6 py-4 border-t border-slate-100 bg-slate-50/50 flex flex-wrap gap-3 justify-end">
                            <button
                                class="px-4 py-2 border border-slate-300 text-slate-700 bg-white hover:bg-slate-50 rounded-xl text-sm font-bold transition flex items-center gap-2"><i
                                    data-lucide="printer" class="w-4 h-4"></i> Cetak Resi</button>
                            <button x-show="dt.status === 'Baru'" @click="acc(dt.id)"
                                class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-xl text-sm font-bold shadow-md transition flex items-center gap-2 drop-shadow-[0_4px_10px_rgba(245,158,11,0.3)]"><i
                                    data-lucide="box" class="w-4 h-4"></i> Proses Kemas</button>
                            <button x-show="dt.status === 'Dikemas'" @click="ship(dt.id)"
                                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-bold shadow-md transition flex items-center gap-2 drop-shadow-[0_4px_10px_rgba(16,185,129,0.3)]"><i
                                    data-lucide="truck" class="w-4 h-4"></i> Panggil Kurir (Pickup)</button>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div>
    <script src="js/pesanan.js"></script>
    <!-- Global Toast Notif -->
    <div x-data="{ toasts: [] }"
        @show-toast.window="let id = Date.now(); toasts.push({id, ...$event.detail}); setTimeout(() => { toasts = toasts.filter(t => t.id !== id) }, 6000)"
        class="fixed bottom-4 right-4 z-[999] flex flex-col gap-2 pointer-events-none">
        <template x-for="t in toasts" :key="t.id">
            <div x-show="true" x-transition.opacity.translate.y.50px
                class="bg-white border-l-4 shadow-xl rounded-r-2xl p-4 w-72 sm:w-80 flex gap-3 pointer-events-auto transform transition-all hover:bg-slate-50 relative overflow-hidden group"
                :class="t.type === 'success' ? 'border-emerald-500' : 'border-blue-500'">
                <div class="flex-1 min-w-0 cursor-pointer" @click="if(t.url) window.location.href=t.url">
                    <p class="text-sm font-bold text-slate-900 truncate pr-6" x-text="t.title"></p>
                    <p class="text-xs text-slate-600 line-clamp-2 mt-0.5" x-text="t.text"></p>
                </div>
                <button @click="toasts = toasts.filter(x => x.id !== t.id)"
                    class="text-slate-300 hover:text-rose-500 focus:outline-none transition absolute top-4 right-3 bg-white pl-2">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>
                </button>
            </div>
        </template>
    </div>
    <script src="js/global.js"></script>
</body>
